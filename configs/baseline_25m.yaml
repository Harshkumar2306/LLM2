device: "auto"
dtype: "auto"

d_model: 512
n_heads: 8
n_layers: 8
context_length: 512
vocab_size: 50257

ffn_type: "standard"
attention_type: "mha"
position_type: "absolute"
norm_type: "layer_norm"
dropout: 0.1

batch_size: 16
max_iters: 10000
grad_accum_steps: 1
learning_rate: 0.0003
weight_decay: 0.1
beta1: 0.9
beta2: 0.95
grad_clip: 1.0
warmup_iters: 1000
lr_decay_iters: 10000
min_lr: 0.00003

val_interval: 1000
checkpoint_interval: 1000
eval_iters: 50
eval_interval: 1000
save_interval: 1000
log_interval: 100
resume_mode: "none"

checkpoint:
  keep_last: 3

experiment_name: "baseline_25m_t4"
num_workers: 2
pin_memory: true
persistent_workers: true
prefetch_factor: 2
