datasets:
  - name: "fineweb"
    hf: "HuggingFaceFW/fineweb-edu"
    subset: "sample-10BT"
    split: "train"
    tokens: 4125000000

  - name: "stack"
    hf: "vikp/starcoder_cleaned"
    split: "train"
    tokens: 1500000000

  - name: "wikipedia"
    hf: "wikimedia/wikipedia"
    subset: "20231101.en"
    split: "train"
    tokens: 750000000

  - name: "technical"
    hf: "Open-Orca/OpenOrca"
    split: "train"
    tokens: 750000000
    dedup: true

  - name: "books"
    hf: "JeanKaddour/minipile"
    split: "train"
    tokens: 375000000
